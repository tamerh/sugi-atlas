# =============================================================================
# Atlas gene page — per-gene 5-task DAG
# =============================================================================
#
# DAG per gene (workflow-level for_each, so each gene's DAG runs as an
# isolated iteration — TP53 failures don't block BRCA1):
#
#   collect_render ──┬── body_gate ──────────────────────┐
#                    │                                    ├── publish
#                    └── summary ──── summary_gate ──────┘
#
# Run invocation (per Enju dev guidance — kills per-run branch creation):
#
#   enju go workflows/gene/enju.yaml \
#       --base data \
#       --run-branch "" \
#       --publish none \
#       --params '{"symbols":["TP53"]}'

name: "Atlas gene page"
description: |
  Per-gene Atlas page generation: deterministic collect + render, body_gate
  regression check, LLM summary via OpenRouter, hardened summary judge,
  publish to /data/sugi-atlas-dist/atlas/gene/<symbol>/.

version: 1

# Don't auto-merge or push run output — combined with --run-branch "" on the
# CLI, this gives the "all commits land on the base branch, no per-run refs"
# behaviour we want at scale.
publish:
  mode: none

params:
  - name: symbols
    type: list<string>
    required: true
    description: "Gene symbols (HGNC approved). Start with 1-3 for testing; batch to 50-200 in production."

  - name: dist_root
    type: string
    default: "/data/sugi-atlas-dist"
    description: "Absolute path to the sugi-atlas-dist checkout (publish target)."

  - name: summary_model
    type: string
    default: "qwen/qwen3-235b-a22b-2507|Together"
    description: "OpenRouter model slug for the summary step. Pipe-syntax forces a guardrail-compliant provider."

  - name: skip_summary
    type: string
    default: "false"
    description: "Set 'true' to skip the LLM summary + summary_gate (deterministic-only fast path for early testing)."

for_each:
  symbol: "{{symbols}}"

defaults:
  assign_to: tamerh

tasks:
  - id: collect_render
    action: compute
    script: workflows/gene/scripts/collect_render.sh
    env:
      SYMBOL: "{{symbol}}"
    writes:
      - "build/{{symbol}}/bundle.json"
      - "build/{{symbol}}/body.md"
    prompt: "Collect §1-12 deterministically and render body for {{symbol}}"

  - id: body_gate
    action: compute
    script: workflows/gene/scripts/body_gate.sh
    depends_on: [collect_render]
    env:
      SYMBOL: "{{symbol}}"
    reads:
      - "build/{{symbol}}/bundle.json"
    writes:
      - "build/{{symbol}}/body_gate.json"
    prompt: "Body-gate regression check for {{symbol}} (compare bundle vs snapshot)"

  - id: summary
    action: compute
    script: workflows/gene/scripts/summary.sh
    depends_on: [collect_render]
    env:
      SYMBOL: "{{symbol}}"
      SUMMARY_MODEL: "{{summary_model}}"
      SKIP_SUMMARY: "{{skip_summary}}"
    reads:
      - "build/{{symbol}}/body.md"
    writes:
      - "build/{{symbol}}/summary.md"
    prompt: "Generate executive summary via OpenRouter for {{symbol}}"

  - id: summary_gate
    action: compute
    script: workflows/gene/scripts/summary_gate.sh
    depends_on: [summary]
    env:
      SYMBOL: "{{symbol}}"
      SKIP_SUMMARY: "{{skip_summary}}"
    reads:
      - "build/{{symbol}}/body.md"
      - "build/{{symbol}}/summary.md"
    writes:
      - "build/{{symbol}}/judge.json"
    prompt: "Judge summary faithfulness for {{symbol}}"

  - id: publish
    action: compute
    script: workflows/gene/scripts/publish.sh
    depends_on: [body_gate, summary_gate]
    env:
      SYMBOL: "{{symbol}}"
      DIST_ROOT: "{{dist_root}}"
    reads:
      - "build/{{symbol}}/bundle.json"
      - "build/{{symbol}}/body.md"
      - "build/{{symbol}}/summary.md"
      - "build/{{symbol}}/body_gate.json"
      - "build/{{symbol}}/judge.json"
    writes:
      - "{{dist_root}}/atlas/gene/{{symbol}}/page.md"
    prompt: "Assemble final page.md (frontmatter + summary + body) and write to dist for {{symbol}}"
